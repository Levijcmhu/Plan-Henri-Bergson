<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan du Collège</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#f5f0e8;
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:24px 16px 80px;
  }
  h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.7rem;color:#1a1a1a;letter-spacing:-0.02em;margin-bottom:3px}
  .subtitle{font-size:0.75rem;color:#999;margin-bottom:18px;letter-spacing:0.1em;text-transform:uppercase}
  .tabs{display:flex;gap:0;margin-bottom:18px;border:2px solid #1a1a1a;overflow:hidden;border-radius:2px}
  .tab{padding:9px 32px;background:transparent;border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;cursor:pointer;color:#aaa;transition:all 0.2s;letter-spacing:0.04em}
  .tab.active{background:#1a1a1a;color:#f5f0e8}
  .tab:not(.active):hover{background:#e8e3db;color:#1a1a1a}
  .plan-wrapper{display:none;position:relative}
  .plan-wrapper.active{display:inline-block}
  .plan-wrapper img{display:block;max-width:100%;height:auto;image-rendering:crisp-edges}
  .zone{
    position:absolute;cursor:pointer;
    border:2px solid transparent;
    border-radius:1px;
    transition:background 0.12s,border-color 0.12s;
  }
  .zone:hover{background:rgba(255,200,0,0.22);border-color:rgba(200,140,0,0.6)}
  .zone.active-room{background:rgba(255,200,0,0.38);border-color:#d4a000;border-width:2.5px}
  .tip{
    position:absolute;
    background:#1a1a1a;
    color:#f5f0e8;
    border-left:3px solid #f0a800;
    padding:6px 13px 6px 10px;
    font-family:'Syne',sans-serif;font-weight:700;font-size:0.8rem;
    white-space:nowrap;z-index:99;
    pointer-events:none;
    opacity:0;transition:opacity 0.15s;
    transform:translateX(-50%) translateY(calc(-100% - 8px));
    top:0;left:50%;
    box-shadow:0 3px 12px rgba(0,0,0,0.35);
    border-radius:1px;
  }
  .tip::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#1a1a1a;border-bottom:none}
  .tip.show{opacity:1}
  .tip .n{color:#f0a800;margin-right:7px}
</style>
</head>
<body>

<p class="subtitle">Cliquez sur une salle numérotée</p>

  <button class="tab" onclick="showFloor(2)">2e Étage</button>
</div>

<script>
let cur=null;
function showFloor(n){
  document.querySelectorAll('.plan-wrapper').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('active'));
  document.getElementById('floor'+n).classList.add('active');
  document.querySelectorAll('.tab')[n-1].classList.add('active');
  if(cur){cur.classList.remove('active-room');cur.querySelector('.tip').classList.remove('show');cur=null;}
}
function pick(el,num,name){
  if(cur&&cur!==el){cur.classList.remove('active-room');cur.querySelector('.tip').classList.remove('show');}
  const t=el.querySelector('.tip');
  if(el.classList.contains('active-room')){el.classList.remove('active-room');t.classList.remove('show');cur=null;}
  else{el.classList.add('active-room');t.classList.add('show');cur=el;}
}
document.addEventListener('click',function(e){
  if(cur&&!cur.contains(e.target)){cur.classList.remove('active-room');cur.querySelector('.tip').classList.remove('show');cur=null;}
});
</script>
